<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fishink</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="view" id="main-view">
        <div class="topbar">
          <div class="title-wrap">
            <h1>Fishink</h1>
            <p id="status-text">Fishink sedang memantau URL</p>
          </div>

          <button
            id="settings-btn"
            class="icon-btn"
            type="button"
            aria-label="Settings"
          >
            ⚙
          </button>
        </div>

        <div class="site-pill">
          <span id="site-text">-</span>
        </div>

        <div class="switch-wrap">
          <label class="switch">
            <input id="enabled-toggle" type="checkbox" />
            <span class="slider"></span>
          </label>

          <div class="switch-caption">
            <strong id="enabled-label">Enabled</strong>
            <span id="enabled-desc">Proteksi aktif</span>
          </div>
        </div>

        <footer class="footer">
          <div class="made-line">Made with ❤️ by Andy</div>
          <a
            href="https://github.com/andyrhman/fishink-extension"
            target="_blank"
            rel="noreferrer"
            class="github-link"
            aria-label="Fishink GitHub repository"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" class="github-icon">
              <path
                fill="currentColor"
                d="M12 .5C5.73.5.5 5.84.5 12.3c0 5.16 3.29 9.53 7.86 11.08.58.11.79-.26.79-.57 0-.28-.01-1.02-.02-2-3.2.72-3.88-1.6-3.88-1.6-.53-1.4-1.3-1.77-1.3-1.77-1.06-.75.08-.74.08-.74 1.17.08 1.79 1.25 1.79 1.25 1.04 1.82 2.73 1.29 3.4.98.11-.78.41-1.29.75-1.59-2.56-.3-5.26-1.33-5.26-5.93 0-1.31.45-2.38 1.19-3.22-.12-.3-.52-1.54.11-3.2 0 0 .98-.32 3.2 1.23a10.96 10.96 0 0 1 5.83 0c2.22-1.55 3.2-1.23 3.2-1.23.63 1.66.23 2.9.11 3.2.74.84 1.19 1.91 1.19 3.22 0 4.61-2.7 5.63-5.27 5.92.42.38.8 1.12.8 2.26 0 1.63-.01 2.94-.01 3.34 0 .31.2.69.79.57A11.95 11.95 0 0 0 23.5 12.3C23.5 5.84 18.27.5 12 .5Z"
              />
            </svg>
            <span>GitHub</span>
          </a>
        </footer>
      </section>

      <section class="view hidden" id="settings-view">
        <div class="topbar">
          <div class="title-wrap">
            <h1>Whitelist</h1>
            <p>Website yang diizinkan akan melewati model.</p>
          </div>

          <button
            id="back-btn"
            class="icon-btn"
            type="button"
            aria-label="Back"
          >
            ←
          </button>
        </div>

        <div class="whitelist-box">
          <div id="whitelist-list" class="whitelist-list"></div>
        </div>

        <div class="add-box">
          <label for="site-input">Tambah website</label>
          <input
            id="site-input"
            type="text"
            placeholder="Enter website URL.."
          />
          <button id="add-btn" type="button">Add Website</button>
        </div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
